services:
  - type: web
    name: ctrl-why-api
    runtime: python
    plan: free
    rootDir: services/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    numInstances: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.6-sol
